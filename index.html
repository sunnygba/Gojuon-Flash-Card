<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五十音 Flash Card</title>
<style>
  :root {
    --primary: #4A90E2;
    --success: #2ECC71;
    --danger: #E74C3C;
    --bg: #F5F7FA;
    --card-bg: #FFFFFF;
    --text: #333333;
  }
  * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
  body { background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
  .container { width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; }
  
  h1, h2 { text-align: center; color: var(--primary); }
  .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
  .section:last-child { border-bottom: none; }
  
  label { display: block; margin: 8px 0; cursor: pointer; }
  .inline-labels label { display: inline-block; margin-right: 15px; }
  input[type="number"] { width: 80px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
  
  button { 
    background-color: var(--primary); color: white; border: none; padding: 12px 20px; 
    border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; transition: 0.2s;
  }
  button:hover { background-color: #357ABD; }
  button:disabled { background-color: #ccc; cursor: not-allowed; }
  
  /* 全域控制列 (靜音 / 羅馬拼音 / 語速) */
  .global-controls { background: #E8F0FE; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; font-weight: bold; color: var(--primary); }
  .global-controls select { padding: 3px; border-radius: 4px; border: 1px solid #ccc; color: var(--text); }

  /* 遊戲畫面 UI */
  #quiz-view, #result-view { display: none; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; }
  .progress-container { width: 100%; background: #eee; border-radius: 4px; height: 10px; overflow: hidden;}
  #time-bar { height: 100%; background: var(--success); width: 100%; transition: width 0.1s linear, background-color 0.3s; }
  
  .flashcard { 
    background: #fff; border: 2px solid var(--primary); border-radius: 16px; 
    height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;
    cursor: pointer; margin-bottom: 20px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    user-select: none; position: relative;
  }
  .flashcard-main { font-size: 80px; }
  .flashcard-romaji { font-size: 24px; color: #888; margin-top: 10px; display: none; }
  
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn { background: #f0f4f8; color: var(--text); border: 2px solid #dcdcdc; font-size: 22px; padding: 15px; }
  .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
  .option-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }
  
  /* 純翻卡模式按鈕 */
  .self-eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .btn-knew { background-color: var(--success); }
  .btn-forgot { background-color: var(--danger); }

  /* 免責聲明 */
  .disclaimer {
    margin-top: 25px;
    padding-top: 15px;
    border-top: 1px solid #eee;
    font-size: 12px;
    color: #999;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="container" id="app">
  
  <div class="global-controls">
    <label><input type="checkbox" id="global-mute"> 🔇 靜音</label>
    <label><input type="checkbox" id="global-romaji" onchange="app.toggleRomaji()"> 👁️ 羅馬拼音</label>
    <label>🐢 Web Speech API語速: 
      <select id="speech-rate">
        <option value="0.1">極慢</option>
        <option value="0.25">慢速</option>
        <option value="0.5" selected>正常</option>
      </select>
    </label>
  </div>

  <div id="settings-view">
    <h1>⚡五十音 Flash Card⚡</h1>
    
    <div class="section inline-labels">
      <h3>❓問題卡範圍</h3>
      <label><input type="checkbox" id="range-seion" checked> 清音+撥音</label>
      <label><input type="checkbox" id="range-dakuon"> 濁音</label>
      <label><input type="checkbox" id="range-handakuon"> 半濁音</label>
      <label><input type="checkbox" id="range-yoon"> 拗音</label>
    </div>

    <div class="section inline-labels">
      <h3>❓問題卡字型</h3>
      <label><input type="checkbox" id="q-hira" checked> 平假名</label>
      <label><input type="checkbox" id="q-kata"> 片假名</label>
    </div>

    <div class="section inline-labels">
      <h3>🧐答題卡內容</h3>
      <label><input type="checkbox" id="a-kana" checked> 平假/片假名</label>
      <label><input type="checkbox" id="a-roma"> 羅馬拼音</label>
    </div>

    <div class="section">
      <h3>⚙️設定</h3>
      <label>⌛答題時限: <input type="number" id="time-limit" value="0" min="0"> (0為不限時)</label>
      <label>🃏答題卡數量: <input type="number" id="opt-count" value="4" min="2" max="10"> (選擇數量)</label>
      <label>🃏問題卡數量: <input type="number" id="q-count" value="20" min="1"> (問題數量)</label>
      <label><strong>😈<input type="checkbox" id="no-opt-mode"> 無答題卡模式</strong></label>
    </div>

    <button onclick="app.startQuiz()">開始測驗</button>
  </div>

  <div id="quiz-view">
    <div class="top-bar">
      <span id="progress-text">1 / 20</span>
      <span id="score-text">得分: 0</span>
      <button style="width:auto; padding: 5px 15px; font-size:14px;" onclick="app.quit()">結束 / 放棄</button>
    </div>
    <div class="progress-container"><div id="time-bar"></div></div>
    
    <div class="flashcard" onclick="app.playCurrentAudio()">
      <div class="flashcard-main" id="card-display">あ</div>
      <div class="flashcard-romaji" id="card-romaji">a</div>
    </div>
    <div style="text-align:center; color:#666; font-size:12px; margin-bottom:10px;">點擊卡片可發音</div>

    <div class="options-grid" id="options-container"></div>

    <div id="no-opt-controls" style="display:none;">
      <button onclick="app.revealAnswer()">顯示答案</button>
      <div class="self-eval-grid" id="self-eval-btns" style="display:none;">
        <button class="btn-knew" onclick="app.handleSelfEval(true)">記得</button>
        <button class="btn-forgot" onclick="app.handleSelfEval(false)">忘記了</button>
      </div>
    </div>
  </div>

  <div id="result-view">
    <h1>測驗結束！</h1>
    <h2 id="final-score">得分: 0 / 20</h2>
    <button onclick="app.quit()" style="margin-top: 20px;">回到設定頁</button>
  </div>

  <div class="disclaimer">
    只供學習之用<br>
    Web Speech API讀法只供參考<br>
    Developed by YS WONG<br>
    (Version 1.2.26.06.22)<br>
    <a class="bmc-btn" href="https://buymeacoffee.com/sunnygor" target="_blank">
      <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height: 40px !important;width: 145px !important;" >
    </a>
  </div>

</div>

<script>
// 完整五十音字典
const rawKanaData = [
  // 清音 + 撥音
  ['a','あ','ア','seion'],['i','い','イ','seion'],['u','う','ウ','seion'],['e','え','エ','seion'],['o','お','オ','seion'],
  ['ka','か','カ','seion'],['ki','き','キ','seion'],['ku','く','ク','seion'],['ke','け','ケ','seion'],['ko','こ','コ','seion'],
  ['sa','さ','サ','seion'],['shi','し','シ','seion'],['su','す','ス','seion'],['se','せ','セ','seion'],['so','そ','ソ','seion'],
  ['ta','た','タ','seion'],['chi','ち','チ','seion'],['tsu','つ','ツ','seion'],['te','て','テ','seion'],['to','と','ト','seion'],
  ['na','な','ナ','seion'],['ni','に','ニ','seion'],['nu','ぬ','ヌ','seion'],['ne','ね','ネ','seion'],['no','の','ノ','seion'],
  ['ha','は','ハ','seion'],['hi','ひ','ヒ','seion'],['fu','ふ','フ','seion'],['he','へ','ヘ','seion'],['ho','ほ','ホ','seion'],
  ['ma','ま','マ','seion'],['mi','み','ミ','seion'],['mu','む','ム','seion'],['me','め','メ','seion'],['mo','も','モ','seion'],
  ['ya','や','ヤ','seion'],['yu','ゆ','ユ','seion'],['yo','よ','ヨ','seion'],
  ['ra','ら','ラ','seion'],['ri','り','リ','seion'],['ru','る','ル','seion'],['re','れ','レ','seion'],['ro','ろ','ロ','seion'],
  ['wa','わ','ワ','seion'],['wo','を','ヲ','seion'],['n','ん','ン','seion'],
  // 濁音
  ['ga','が','ガ','dakuon'],['gi','ぎ','ギ','dakuon'],['gu','ぐ','グ','dakuon'],['ge','げ','ゲ','dakuon'],['go','ご','ゴ','dakuon'],
  ['za','ざ','ザ','dakuon'],['ji','じ','ジ','dakuon'],['zu','ず','ズ','dakuon'],['ze','ぜ','ゼ','dakuon'],['zo','ぞ','ゾ','dakuon'],
  ['da','だ','ダ','dakuon'],['de','で','デ','dakuon'],['do','ど','ド','dakuon'],
  ['ba','ば','バ','dakuon'],['bi','び','ビ','dakuon'],['bu','ぶ','ブ','dakuon'],['be','べ','ベ','dakuon'],['bo','ぼ','ボ','dakuon'],
  // 半濁音
  ['pa','ぱ','パ','handakuon'],['pi','ぴ','ピ','handakuon'],['pu','ぷ','プ','handakuon'],['pe','ぺ','ペ','handakuon'],['po','ぽ','ポ','handakuon'],
  // 拗音
  ['kya','きゃ','キャ','yoon'],['kyu','きゅ','キュ','yoon'],['kyo','きょ','キョ','yoon'],
  ['sha','しゃ','シャ','yoon'],['shu','しゅ','シュ','yoon'],['sho','しょ','ショ','yoon'],
  ['cha','ちゃ','チャ','yoon'],['chu','ちゅ','チュ','yoon'],['cho','ちょ','チョ','yoon'],
  ['nya','にゃ','ニャ','yoon'],['nyu','にゅ','ニュ','yoon'],['nyo','にょ','ニョ','yoon'],
  ['hya','ひゃ','ヒャ','yoon'],['hyu','ひゅ','ヒュ','yoon'],['hyo','ひょ','ヒョ','yoon'],
  ['mya','みゃ','ミャ','yoon'],['myu','みゅ','ミュ','yoon'],['myo','みょ','ミョ','yoon'],
  ['rya','りゃ','リャ','yoon'],['ryu','りゅ','リュ','yoon'],['ryo','りょ','リョ','yoon'],
  ['gya','ぎゃ','ギャ','yoon'],['gyu','ぎゅ','ギュ','yoon'],['gyo','ぎょ','ギョ','yoon'],
  ['ja','じゃ','ジャ','yoon'],['ju','じゅ','ジュ','yoon'],['jo','じょ','ジョ','yoon'],
  ['bya','びゃ','ビャ','yoon'],['byu','びゅ','ビュ','yoon'],['byo','びょ','ビョ','yoon'],
  ['pya','ぴゃ','ピャ','yoon'],['pyu','ぴゅ','ピュ','yoon'],['pyo','ぴょ','ピョ','yoon']
];

const kanaDict = rawKanaData.map(item => ({ r: item[0], h: item[1], k: item[2], type: item[3] }));

const app = {
  questions: [], currentQIndex: 0, score: 0, timer: null, timeLeft: 0, isNoOptMode: false, currentQ: null, currentCorrectAText: '', currentQCharType: '',
  
  toggleRomaji() {
    const isChecked = document.getElementById('global-romaji').checked;
    document.getElementById('card-romaji').style.display = isChecked ? 'block' : 'none';
  },

  playAudio(text) {
    if(document.getElementById('global-mute').checked) return;
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    
    // 讀取全域控制列中的語速設定 (0.1, 0.25, 0.5)
    utterance.rate = parseFloat(document.getElementById('speech-rate').value) || 0.5;
    
    window.speechSynthesis.speak(utterance);
  },

  playCurrentAudio() {
    if(this.currentQ) {
      this.playAudio(this.currentQ.h);
    }
  },

  startQuiz() {
    const useSeion = document.getElementById('range-seion').checked;
    const useDakuon = document.getElementById('range-dakuon').checked;
    const useHandakuon = document.getElementById('range-handakuon').checked;
    const useYoon = document.getElementById('range-yoon').checked;
    
    let pool = kanaDict.filter(k => 
      (useSeion && k.type === 'seion') || 
      (useDakuon && k.type === 'dakuon') || 
      (useHandakuon && k.type === 'handakuon') || 
      (useYoon && k.type === 'yoon')
    );

    if(pool.length === 0) return alert('請至少選擇一種題目範圍！');

    const useQHira = document.getElementById('q-hira').checked;
    const useQKata = document.getElementById('q-kata').checked;
    if(!useQHira && !useQKata) return alert('請至少選擇一種題目顯示字型！');

    const useAKana = document.getElementById('a-kana').checked;
    const useARoma = document.getElementById('a-roma').checked;
    if(!useAKana && !useARoma) return alert('請至少選擇一種答題卡內容！');

    const qCount = parseInt(document.getElementById('q-count').value) || 20;
    this.isNoOptMode = document.getElementById('no-opt-mode').checked;

    this.questions = [];
    for(let i=0; i<qCount; i++) {
      let randKana = pool[Math.floor(Math.random() * pool.length)];
      this.questions.push(randKana);
    }

    this.currentQIndex = 0;
    this.score = 0;
    
    document.getElementById('settings-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('quiz-view').style.display = 'block';
    
    this.loadQuestion();
  },

  loadQuestion() {
    clearInterval(this.timer);
    if(this.currentQIndex >= this.questions.length) return this.endQuiz();

    this.currentQ = this.questions[this.currentQIndex];
    document.getElementById('progress-text').innerText = `${this.currentQIndex + 1} / ${this.questions.length}`;
    document.getElementById('score-text').innerText = `得分: ${this.score}`;

    // 決定題目的顯示字型
    const useQHira = document.getElementById('q-hira').checked;
    const useQKata = document.getElementById('q-kata').checked;
    
    if(useQHira && useQKata) {
      this.currentQCharType = Math.random() > 0.5 ? 'h' : 'k';
    } else {
      this.currentQCharType = useQHira ? 'h' : 'k';
    }

    document.getElementById('card-display').innerText = this.currentQ[this.currentQCharType];
    document.getElementById('card-romaji').innerText = this.currentQ.r; 
    this.playCurrentAudio(); 

    if(this.isNoOptMode) {
      document.getElementById('options-container').style.display = 'none';
      document.getElementById('no-opt-controls').style.display = 'block';
      document.getElementById('no-opt-controls').children[0].style.display = 'block';
      document.getElementById('self-eval-btns').style.display = 'none';
      this.startTimer(true);
    } else {
      document.getElementById('options-container').style.display = 'grid';
      document.getElementById('no-opt-controls').style.display = 'none';
      
      this.currentCorrectAText = this.getOptionText(this.currentQ);
      this.generateOptions();
      this.startTimer(false);
    }
  },

  getOptionText(kanaObj) {
    const useAKana = document.getElementById('a-kana').checked;
    const useARoma = document.getElementById('a-roma').checked;
    
    let targetKana = this.currentQCharType === 'h' ? kanaObj.k : kanaObj.h;
    
    if(useAKana && useARoma) {
      return `${targetKana} (${kanaObj.r})`;
    } else if(useAKana) {
      return targetKana;
    } else {
      return kanaObj.r;
    }
  },

  generateOptions() {
    const optCount = parseInt(document.getElementById('opt-count').value);
    let optionsTextArr = [this.currentCorrectAText];
    let isYoon = this.currentQ.type === 'yoon';
    
    let distractorPool = kanaDict.filter(k => isYoon ? k.type === 'yoon' : k.type !== 'yoon');
    distractorPool.sort(() => 0.5 - Math.random()); 

    for(let k of distractorPool) {
      if(optionsTextArr.length >= optCount) break;
      let val = this.getOptionText(k);
      if(!optionsTextArr.includes(val)) optionsTextArr.push(val);
    }

    if(optionsTextArr.length < optCount) {
      let backupPool = [...kanaDict].sort(() => 0.5 - Math.random());
      for(let k of backupPool) {
        if(optionsTextArr.length >= optCount) break;
        let val = this.getOptionText(k);
        if(!optionsTextArr.includes(val)) optionsTextArr.push(val);
      }
    }

    optionsTextArr.sort(() => 0.5 - Math.random()); 
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    optionsTextArr.forEach(opt => {
      let btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt;
      btn.onclick = () => this.checkAnswer(opt, btn);
      container.appendChild(btn);
    });
  },

  startTimer(isFlashcard) {
    let limit = parseInt(document.getElementById('time-limit').value);
    const timeBar = document.getElementById('time-bar');
    
    if(limit <= 0) { timeBar.style.width = '100%'; timeBar.style.backgroundColor = 'var(--primary)'; return; }
    
    this.timeLeft = limit;
    timeBar.style.width = '100%';
    timeBar.style.backgroundColor = 'var(--success)';
    
    let step = 100 / (limit * 10);
    let currentWidth = 100;
    
    this.timer = setInterval(() => {
      currentWidth -= step;
      timeBar.style.width = `${currentWidth}%`;
      
      if(currentWidth <= 30) timeBar.style.backgroundColor = 'var(--danger)'; 
      
      if(currentWidth <= 0) {
        clearInterval(this.timer);
        if(!isFlashcard) this.checkAnswer(null, null); 
      }
    }, 100);
  },

  checkAnswer(selected, btnElement) {
    clearInterval(this.timer);
    let buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true); 

    let isCorrect = selected === this.currentCorrectAText;
    
    if(isCorrect) {
      if(btnElement) btnElement.classList.add('correct');
      this.score++;
    } else {
      if(btnElement) btnElement.classList.add('wrong');
      buttons.forEach(b => {
        if(b.innerText === this.currentCorrectAText) b.classList.add('correct');
      });
    }

    setTimeout(() => {
      this.currentQIndex++;
      this.loadQuestion();
    }, 1500);
  },

  revealAnswer() {
    clearInterval(this.timer);
    document.getElementById('card-display').innerText = `${this.currentQ.h} / ${this.currentQ.k}`;
    document.getElementById('card-romaji').innerText = this.currentQ.r;
    document.getElementById('card-romaji').style.display = 'block'; 
    
    document.getElementById('no-opt-controls').children[0].style.display = 'none';
    document.getElementById('self-eval-btns').style.display = 'grid';
  },

  handleSelfEval(knew) {
    if(knew) this.score++;
    
    this.toggleRomaji();
    
    this.currentQIndex++;
    this.loadQuestion();
  },

  endQuiz() {
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';
    document.getElementById('final-score').innerText = `得分: ${this.score} / ${this.questions.length}`;
  },

  quit() {
    clearInterval(this.timer);
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('settings-view').style.display = 'block';
  }
};
</script>
</body>
</html>
